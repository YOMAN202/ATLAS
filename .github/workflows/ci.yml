name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    # DB-dependent tests (Phase 1: constraint + migration tests) need a
    # real MySQL 8 to run against — per TDD §12 / Master Prompt §11,
    # "ETL and API tests run against a containerized MySQL instance spun
    # up in the CI job."
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: changeme_root
          MYSQL_DATABASE: atlas_oltp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -pchangeme_root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL_OLTP: mysql+pymysql://root:changeme_root@127.0.0.1:3306/atlas_oltp_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Migration up/down/up smoke test
        env:
          DATABASE_URL_OLTP: mysql+pymysql://root:changeme_root@127.0.0.1:3306/atlas_oltp_test
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend — lint + format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check
